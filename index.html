<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>Random GitHub Repo</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/control.css">
    <link rel="stylesheet" href="css/history.css">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="stylesheet" href="css/result.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main>
        <div id="controls" class="panel">
            <label>
                Language
                <select id="language"></select>
            </label>

            <div class="row">
                <label>
                    Page
                    <input type="number" id="page" min="1" max="1000" value="1">
                </label>

                <label>
                    Per page
                    <input type="number" id="per-page" min="1" max="100" value="6">
                </label>
            </div>

            <button id="guess" disabled>Guess</button>
        </div>
        <div id="container">
            <div id="loading">Loading data...</div>
            <div id="error"></div>

            <div id="result" style="display: none;">
                <div id="result-data" class="minimal"></div>
                <div id="word-display">
                    <strong>Word:</strong> <span id="word"></span> |
                    <strong>Category:</strong> <span id="category"></span> |
                    <strong>Language:</strong> <span id="lang"></span>
                </div>
            </div>
        </div>
        <div id="history-panel" class="panel">
            <h2>History</h2>
            <button id="clearHistory">Clear</button>
            <div id="history"></div>
        </div>
    </main>

    <button id="toggleControl" class="toggle-btn left">−</button>
    <button id="toggleHistory" class="toggle-btn right">−</button>

    <script src="index.js"></script>
</body>

</html>
